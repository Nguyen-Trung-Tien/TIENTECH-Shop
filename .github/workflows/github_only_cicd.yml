name: GitHub Pure CI/CD

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  packages: write

jobs:
  # --- 1. KIỂM TRA CHẤT LƯỢNG (CI) ---
  build-and-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: db_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            BackEnd/package-lock.json
            FrontEnd/package-lock.json

      - name: Backend - Test
        working-directory: ./BackEnd
        run: |
          npm ci
          npm test
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: db_test
          JWT_SECRET: github_test_secret

      - name: Frontend - Build
        working-directory: ./FrontEnd
        run: |
          npm ci
          npm run build

      # Lưu lại bản build của Frontend để dùng cho bước Deploy
      - name: Upload Frontend Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./FrontEnd/dist

  # --- 2. TRIỂN KHAI FRONTEND LÊN GITHUB PAGES ---
  deploy-frontend:
    needs: build-and-test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # --- 3. ĐÓNG GÓI & LƯU TRỮ BACKEND LÊN GITHUB PACKAGES (GHCR) ---
  package-backend:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./BackEnd
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/project-backend:latest
            ghcr.io/${{ github.repository_owner }}/project-backend:${{ github.sha }}
