<svg viewBox="0 0 450 110" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Shield Gradient -->
    <linearGradient id="tientechShieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    
    <!-- T Emblem Glow Gradient -->
    <linearGradient id="tientechTGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.65" />
    </linearGradient>
    
    <!-- Tech Text Gradient -->
    <linearGradient id="tientechTextGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Outer Glow Filter -->
    <filter id="tientechGlowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Shield Icon Group (Box 100x100 at x=5, y=5) -->
  <g transform="translate(5, 5)">
    <!-- Soft Glow Backdrop -->
    <path
      d="M50 8L88 24V50C88 73.19 71.8 91.56 50 96C28.2 91.56 12 73.19 12 50V24L50 8Z"
      fill="url(#tientechShieldGrad)"
      opacity="0.45"
      filter="url(#tientechGlowFilter)"
    />

    <!-- Outer Shield Frame -->
    <path
      d="M50 8L88 24V50C88 73.19 71.8 91.56 50 96C28.2 91.56 12 73.19 12 50V24L50 8Z"
      fill="url(#tientechShieldGrad)"
    />

    <!-- Inner Shield Overlay -->
    <path
      d="M50 16L80 29.5V50C80 68.5 67 83.2 50 87C33 83.2 20 68.5 20 50V29.5L50 16Z"
      fill="#090d16"
      fill-opacity="0.35"
    />

    <!-- Emblem Letter T -->
    <path
      d="M32 34H68V42H54V74H46V42H32V34Z"
      fill="url(#tientechTGlow)"
    />

    <!-- Shopping Bag Handle -->
    <path
      d="M38 34C38 27.37 43.37 22 50 22C56.63 22 62 27.37 62 34"
      stroke="#ffffff"
      stroke-width="5"
      stroke-linecap="round"
    />

    <!-- AI Node Accent -->
    <circle cx="50" cy="58" r="4.5" fill="#06b6d4" />
  </g>

  <!-- Brand Typography (Positioned at x=125) -->
  <g transform="translate(125, 0)">
    <!-- TIEN TECH Brand Name -->
    <text x="0" y="74" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="58" letter-spacing="-1">
      <tspan fill="#0f172a" class="brand-tien">TIEN</tspan><tspan fill="url(#tientechTextGrad)">TECH</tspan>
    </text>
  </g>

  <style>
    @media (prefers-color-scheme: dark) {
      .brand-tien { fill: #ffffff !important; }
    }
  </style>
</svg>
